{% extends "base.html" %}
{% block content %}
<style>
  .rate-input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
  .rate-card { background: #f9f9f9; padding: 12px; border-radius: 8px; border: 1px solid var(--line); }
  .rate-card input { margin-bottom: 8px; }
  .rate-card input[type="date"] { margin-bottom: 8px; }
</style>

<header class="top">
  <div>
    <h1>Valyuta Kursları</h1>
    <p>Turli valyutalar orasidagi konversiya kurslarini boshqarish</p>
  </div>
</header>

<div class="panel">
  <h2>Kurs Yangilash</h2>
  <div class="rate-input-grid">
    <div class="rate-card">
      <label><b>Valuta juftligi</b></label>
      <input id="currency" type="text" value="USD_TO_UZS" placeholder="Masalan: USD_TO_UZS">
      
      <label><b>Kurs</b></label>
      <input id="rate" type="number" step="0.01" placeholder="Masalan: 13000">
      
      <label><b>Sana</b></label>
      <input id="date" type="date" value="{{ datetime.now().strftime('%Y-%m-%d') }}">
      
      <button onclick="setExchangeRate()">Saqlash</button>
    </div>
  </div>
</div>

<div class="panel">
  <h2>Asosiy Kurslar</h2>
  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px;">
    <div style="padding: 12px; background: #f0f8f0; border-radius: 8px; border-left: 4px solid var(--primary);">
      <div style="font-size: 12px; color: var(--muted);">1 USD = ?</div>
      <div style="font-size: 20px; font-weight: bold; margin-top: 4px;">
        <span id="usdRate">-</span> UZS
      </div>
    </div>
    <div style="padding: 12px; background: #f0f0f8; border-radius: 8px; border-left: 4px solid #4a5fc1;">
      <div style="font-size: 12px; color: var(--muted);">1 EUR = ?</div>
      <div style="font-size: 20px; font-weight: bold; margin-top: 4px;">
        <span id="eurRate">-</span> UZS
      </div>
    </div>
    <div style="padding: 12px; background: #f8f0f0; border-radius: 8px; border-left: 4px solid #c14a4a;">
      <div style="font-size: 12px; color: var(--muted);">1 RUB = ?</div>
      <div style="font-size: 20px; font-weight: bold; margin-top: 4px;">
        <span id="rubRate">-</span> UZS
      </div>
    </div>
  </div>
</div>

<div class="panel">
  <h2>Kurslarni Hisoblash</h2>
  <div class="grid two">
    <div>
      <label><b>Miqdor</b></label>
      <input id="amount" type="number" step="0.01" placeholder="Miqdor kiriting" value="100">
    </div>
    <div>
      <label><b>Valyuta</b></label>
      <select id="currency2">
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
        <option value="RUB">RUB</option>
        <option value="KZT">KZT</option>
      </select>
    </div>
  </div>
  <div style="padding: 12px; background: #f9f9f9; border-radius: 8px; margin-top: 12px; text-align: center;">
    <p style="margin: 0; color: var(--muted); font-size: 14px;">Natija</p>
    <div style="font-size: 24px; font-weight: bold; margin-top: 8px;">
      <span id="convResult">-</span> UZS
    </div>
  </div>
</div>

<script>
  function setExchangeRate() {
    const currency = document.getElementById('currency').value.toUpperCase();
    const rate = parseFloat(document.getElementById('rate').value);
    const date = document.getElementById('date').value;
    
    if (!currency || !rate) {
      alert('Valuta va kursni kiriting');
      return;
    }
    
    fetch('/api/exchange-rates', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ currency, rate, date })
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        alert('Kurs saqlandi');
        location.reload();
      } else {
        alert('Xato: ' + (data.error || 'Noma\'lum xato'));
      }
    })
    .catch(err => alert('Xato: ' + err.message));
  }

  function convertCurrency() {
    const amount = parseFloat(document.getElementById('amount').value) || 0;
    const currency = document.getElementById('currency2').value;
    
    // Approximate rates (replace with API call if needed)
    const rates = {
      'USD': 13000,
      'EUR': 14500,
      'RUB': 140,
      'KZT': 28
    };
    
    const result = amount * (rates[currency] || 1);
    document.getElementById('convResult').textContent = result.toLocaleString('uz-UZ', { maximumFractionDigits: 0 });
  }

  document.getElementById('amount')?.addEventListener('change', convertCurrency);
  document.getElementById('currency2')?.addEventListener('change', convertCurrency);
  
  // Initial load
  convertCurrency();
</script>
{% endblock %}
